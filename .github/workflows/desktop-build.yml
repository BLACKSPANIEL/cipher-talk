name: Build Desktop (Tauri)

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g. v0.1.0)'
        required: true
        default: 'v0.1.0'

jobs:
  build:
    strategy:
      matrix:
        include:
          - platform: 'windows-latest'
            args: '--target x86_64-pc-windows-msvc'
          - platform: 'macos-latest'
            args: '--target x86_64-apple-darwin'
          - platform: 'macos-latest'
            args: '--target aarch64-apple-darwin'
          - platform: 'ubuntu-latest'
            args: '--target x86_64-unknown-linux-gnu'

    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js
        run: npm run build

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && matrix.args == '--target aarch64-apple-darwin' && 'aarch64-apple-darwin' || 'x86_64-pc-windows-msvc' || 'x86_64-unknown-linux-gnu' || 'x86_64-apple-darwin' }}

      - name: Install Tauri CLI
        run: cargo install tauri-cli

      - name: Build Tauri App
        run: cargo tauri build ${{ matrix.args }}
        working-directory: src-tauri

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: CipherTalk-${{ matrix.platform }}-${{ github.ref_name }}
          path: |
            src-tauri/target/${{ matrix.platform == 'windows-latest' && 'x86_64-pc-windows-msvc/release' || matrix.args == '--target aarch64-apple-darwin' && 'aarch64-apple-darwin/release' || 'x86_64-apple-darwin/release' || 'x86_64-unknown-linux-gnu/release' }}/bundle/**/*
            src-tauri/target/${{ matrix.platform == 'windows-latest' && 'x86_64-pc-windows-msvc/release' || matrix.args == '--target aarch64-apple-darwin' && 'aarch64-apple-darwin/release' || 'x86_64-apple-darwin/release' || 'x86_64-unknown-linux-gnu/release' }}/CipherTalk*
          if-no-files-found: warn

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            ./artifacts/**/*.exe
            ./artifacts/**/*.msi
            ./artifacts/**/*.app
            ./artifacts/**/*.dmg
            ./artifacts/**/*.AppImage
            ./artifacts/**/*.deb
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}